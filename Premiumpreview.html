  <style>
    body {
      background: url(https://i.pinimg.com/originals/72/08/69/720869c836a0e3f0b11ade1bfb377a69.gif) center /cover no-repeat;
      background-color: #000000;
      cursor: url(http://www.rw-designer.com/cursor-extern.php?id=246959), auto;

    .topo {
      margin-top: -90px;
      height: 90px;
      background: url(https://i.pinimg.com/originals/72/08/69/720869c836a0e3f0b11ade1bfb377a69.gif) center/cover no-repeat;
    }

    .destaque {
      position: relative;
      display: inline-block;
    }

    .destaque::after {
      content: "";
      position: absolute;
      left: -5px;
      right: -5px;
      top: 50%;
      height: 8px;
      background: red;
      transform: translateY(-50%) rotate(-3deg);

      /* efeito irregular (borrisco) */
      filter: blur(1px);
      opacity: 0.8;
    }
  </style>

  <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>

  <title>@|</title>
</head>

<body>
  <script>
    let prefixo = "@";
    let text = "krpris";
    let i = 0;

    let apagando = false;
    let pausando = false;

    let cursorVisivel = true;
    let piscadas = 0;
    let maxPiscadas = 6;

    function animarTitulo() {
      let cursor = cursorVisivel ? "|" : " ";
      cursorVisivel = !cursorVisivel;

      if (!apagando && !pausando) {
        document.title = prefixo + text.substring(0, i) + cursor;
        i++;

        if (i > text.length) {
          i = text.length;
          pausando = true;
          piscadas = 0;
          return setTimeout(animarTitulo, 300);
        }

      } else if (pausando) {
        document.title = prefixo + text + cursor;
        piscadas++;

        if (piscadas >= maxPiscadas) {
          pausando = false;
          apagando = true;
          i = text.length;
        }

      } else {
        i--;
        document.title = prefixo + text.substring(0, i) + cursor;

        if (i <= 0) {
          pausando = true;
          piscadas = 0;
          apagando = false;
          i = 0;
        }
      }

      setTimeout(animarTitulo, 600);
    }

    animarTitulo();
  </script>

  <div class="cardking">

  <audio id="bg-music" autoplay loop muted>
    <source src="song.m4a" type="audio/mpeg">
  </audio>

  <script>
    document.addEventListener("click", () => {
      const music = document.getElementById("bg-music");
      music.muted = false;
      music.play();
    });
  </script>

  <div style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 15px;
  border-radius: 10px;
  backdrop-filter: blur(5px);
  color: white;
  font-size: 14px;
">
    ♫
    <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.1">
  </div>

  <script>
    const music = document.getElementById("bg-music");
    const volumeControl = document.getElementById("volume-control");
    music.volume = 0.15;

    volumeControl.addEventListener("input", () => {
      music.volume = volumeControl.value;
    });
