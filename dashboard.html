<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <script
    src="https://kit.fontawesome.com/eb9af641fe.js"
    crossorigin="anonymous">
  </script>

</head>

<body>

  <div class="dashboard">

    <!-- editor -->

    <div class="editor">

      <h2>EDITOR</h2>

      <!-- perfil -->

      <div class="section active">

        <button class="toggle">
          Perfil
        </button>

        <div class="content">

          <input
            id="name-input"
            placeholder="Nome"
          >

          <textarea
            id="bio-input"
            placeholder="Bio">
          </textarea>

          <input
            id="avatar-input"
            placeholder="Avatar URL"
          >

          <input
            id="banner-input"
            placeholder="Banner URL"
          >

          <input
            id="background-input"
            placeholder="Background URL"
          >

        </div>

      </div>

      <!-- redes -->

      <div class="section active">

        <button class="toggle">
          Redes
        </button>

        <div class="content">

          <input id="discord-input" placeholder="Discord">

          <input id="instagram-input" placeholder="Instagram">

          <input id="spotify-input" placeholder="Spotify">

          <input id="tiktok-input" placeholder="TikTok">

          <input id="twitter-input" placeholder="Twitter/X">

          <input id="youtube-input" placeholder="YouTube">

        </div>

      </div>

      <!-- extras -->

      <div class="section active">

        <button class="toggle">
          Extras
        </button>

        <div class="content">

          <input id="extra1-text" placeholder="Texto">

          <input id="extra1-img" placeholder="Imagem">

          <input id="extra1-link" placeholder="Link">

        </div>

      </div>

      <button id="save-btn">
        SALVAR
      </button>

    </div>

    <!-- preview -->

    <div class="preview-area">

      <div class="cardking">

        <div
          class="topo"
          id="preview-banner">
        </div>

        <img
          id="preview-avatar"
          class="perfilking"
        >

        <div class="conteudoking">

          <h2 id="preview-name">
            usuário
          </h2>

          <p id="preview-bio">
            bio
          </p>

          <div
            class="socials"
            id="socials">
          </div>

          <div id="extras-container"></div>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

  <script src="dashboard.js"></script>

</body>

</html>
