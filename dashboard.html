<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>
</head>

<body>

  <div class="dashboard">

    <!-- EDITOR -->
    <div class="editor">

      <h2>EDITOR</h2>

      <!-- TEMPLATE -->
      <div class="section">
        <button class="toggle">Template</button>

        <div class="content hidden">
          <label>Box/Card</label>
          <select id="box-style-input">

            <option value="blur">
              Vidro borrado
            </option>

            <option value="transparent">
              Vidro Transparente
            </option>

          </select>
          <label>Layout</label>
          <select id="template-input">

            <option value="cardking">
              Normal
            </option>

            <option value="cardkingdois">
              Centralizado
            </option>

            <option value="template3">
              Grande
            </option>

            <option value="template4">
              MInimalista
            </option>

          </select>

          <label>Cor do texto</label>

          <select id="text-color-input">

            <option value="white">
              Branco
            </option>

            <option value="black">
              Preto
            </option>

          </select>

          <!-- TELA DE ENTRADA -->
          <hr>
          <div class="section">
            <button class="toggle">Tela de Entrada</button>

            <div class="content hidden">

              <label>Ativar tela de entrada</label>

              <select id="entrance-enabled">
                <option value="false">Desativada</option>
                <option value="true">Ativada</option>
              </select>

              <label>Mensagem personalizada</label>

              <input id="entrance-text" placeholder="Ex: Bem-vindo ao meu perfil">

            </div>
          </div>

        </div>
      </div>


      <!-- PERFIL -->
      <div class="section">
        <button class="toggle">Perfil</button>

        <div class="content hidden">

          <label>Nome</label>
          <input id="name-input">

          <label>Bio</label>
          <textarea id="bio-input"></textarea>

          <label>Balão</label>
          <input id="overlay-input">

          <div class="upload-box" onclick="document.getElementById('avatar-file').click()">
            <p>Escolher foto de perfil</p>
            <span>PNG, JPG até 5MB</span>
            <input type="file" id="avatar-file" class="file-input" accept="image/*">
          </div>

          <br>

          <div class="upload-box" onclick="document.getElementById('banner-file').click()">
            <p>Escolher Banner</p>
            <span>PNG, JPG até 5MB</span>
            <input type="file" id="banner-file" class="file-input" accept="image/*">
          </div>

          <br>

          <div class="upload-box" onclick="document.getElementById('background-file').click()">
            <p>Escolher Wallpaper</p>
            <span>PNG, JPG até 5MB</span>
            <input type="file" id="background-file" class="file-input" accept="image/*">
          </div>

          <br>

          <div class="upload-box" onclick="document.getElementById('music-file').click()">
            <p>Escolher Música</p>
            <span>MP3 até 10MB</span>

            <input type="file" id="music-file" class="file-input" accept="audio/mp3,audio/mpeg">
          </div>

        </div>
      </div>

      <!-- REDES -->
      <div class="section">
        <button class="toggle">Redes</button>

        <div class="content hidden">

          <input id="youtube-input" placeholder="YouTube">
          <input id="instagram-input" placeholder="Instagram">
          <input id="discord-input" placeholder="Discord">
          <input id="spotify-input" placeholder="Spotify">
          <input id="tiktok-input" placeholder="TikTok">
          <input id="whatsapp-input" placeholder="WhatsApp">
          <input id="twitter-input" placeholder="Twitter/X">
          <input id="facebook-input" placeholder="facebook">
          <input id="telegram-input" placeholder="Telegram">
          <input id="github-input" placeholder="GitHub">
          <input id="linkedin-input" placeholder="LinkedIn">
          <input id="kick-input" placeholder="Kick">
          <input id="roblox-input" placeholder="Roblox">
          <input id="steam-input" placeholder="Steam">
          <input id="xbox-input" placeholder="Xbox">
          <input id="twitch-input" placeholder="Twitch">
          <input id="privacy-input" placeholder="Privacy">
          <input id="onlyfans-input" placeholder="OnlyFans">
          <input id="fivem-input" placeholder="Fivem">
          <input id="pinterest-input" placeholder="Pinterest">
          <input id="email-input" placeholder="Email">
          <input id="threads-input" placeholder="Threads">
          <input id="bsky-input" placeholder="Bsky">
          <input id="vsco-input" placeholder="VSCO">
          <input id="pix-input" placeholder="Pix">
          
        </div>
      </div>

      <!-- CARDS EXTRAS -->
      <div class="section">
        <button class="toggle">Cards Extras</button>

        <div class="content hidden">

          <!-- CARD 1 -->
          <input id="extra1-text" placeholder="Texto 1">
          <input id="extra1-img" placeholder="Imagem 1">
          <input id="extra1-link" placeholder="Link 1">
          <hr>

          <!-- CARD 2 -->
          <input id="extra2-text" placeholder="Texto 2">
          <input id="extra2-img" placeholder="Imagem 2">
          <input id="extra2-link" placeholder="Link 2">
          <hr>

          <!-- CARD 3 -->
          <input id="extra3-text" placeholder="Texto 3">
          <input id="extra3-img" placeholder="Imagem 3">
          <input id="extra3-link" placeholder="Link 3">
          <hr>

          <!-- CARD 4 -->
          <input id="extra4-text" placeholder="Texto 4">
          <input id="extra4-img" placeholder="Imagem 4">
          <input id="extra4-link" placeholder="Link 4">

        </div>
      </div>

      <div class="profile-link-box">
        <label>Seu link de perfil</label>

        <div class="profile-link-row">
          <input id="profile-url" readonly placeholder="Carregando...">

          <button id="copy-profile-url">
            Copiar
          </button>
        </div>
      </div>

      <button id="save-btn">SALVAR PERFIL</button>

    </div>

    <!-- PREVIEW -->
    <div class="preview-area">

      <div class="cardking">

        <div class="topo" id="preview-banner"></div>

        <img id="preview-avatar" class="perfilking">

        <div class="balao" id="preview-overlay"></div>

        <div class="conteudoking">

          <h2 id="preview-name"></h2>
          <p id="preview-bio"></p>

          <div class="socials" id="socials"></div>

          <div id="extras-container"></div>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>

</body>

</html>
