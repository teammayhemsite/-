<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="dashboard">

<!-- EDITOR -->
<div class="editor">

<h2>EDITOR</h2>

<!-- PERFIL -->
<div class="section">
<button class="toggle">PERFIL</button>
<div class="content">

<input id="name-input" placeholder="Nome">
<textarea id="bio-input" placeholder="Bio"></textarea>

<input id="avatar-input" placeholder="Avatar">
<input id="banner-input" placeholder="Banner">
<input id="background-input" placeholder="Fundo">
<input id="overlay-input" placeholder="Balão">

</div>
</div>

<!-- REDES -->
<div class="section">
<button class="toggle">REDES</button>
<div class="content">

<input id="youtube-input" placeholder="YouTube">
<input id="instagram-input" placeholder="Instagram">
<input id="discord-input" placeholder="Discord">
<input id="spotify-input" placeholder="Spotify">

</div>
</div>

<!-- CARDS -->
<div class="section">
<button class="toggle">CARDS EXTRAS</button>

<div class="content">

<!-- 1 -->
<input id="extra1-text" placeholder="Texto 1">
<input id="extra1-img" placeholder="Imagem 1">
<input id="extra1-link" placeholder="Link 1">

<!-- 2 -->
<input id="extra2-text" placeholder="Texto 2">
<input id="extra2-img" placeholder="Imagem 2">
<input id="extra2-link" placeholder="Link 2">

<!-- 3 -->
<input id="extra3-text" placeholder="Texto 3">
<input id="extra3-img" placeholder="Imagem 3">
<input id="extra3-link" placeholder="Link 3">

<!-- 4 -->
<input id="extra4-text" placeholder="Texto 4">
<input id="extra4-img" placeholder="Imagem 4">
<input id="extra4-link" placeholder="Link 4">

<!-- 5 -->
<input id="extra5-text" placeholder="Texto 5">
<input id="extra5-img" placeholder="Imagem 5">
<input id="extra5-link" placeholder="Link 5">

</div>
</div>

<button id="save-btn">SALVAR</button>

</div>

<!-- PREVIEW -->
<div class="preview-area">

<div class="cardking" id="preview-card">

<div class="topo" id="preview-banner"></div>

<img id="preview-avatar" class="perfilking">

<div class="balao" id="preview-overlay"></div>

<div class="conteudoking">

<h2 id="preview-name"></h2>
<p id="preview-bio"></p>

<div class="socials">

<a id="youtube-link"><i class="fa-brands fa-youtube"></i></a>
<a id="instagram-link"><i class="fa-brands fa-instagram"></i></a>
<a id="discord-link"><i class="fa-brands fa-discord"></i></a>
<a id="spotify-link"><i class="fa-brands fa-spotify"></i></a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
