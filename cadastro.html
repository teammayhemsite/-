<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">

  <title>Cadastro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-card">

    <h1>CRIAR CONTA</h1>

    <input
      type="text"
      placeholder="Usuário"
      id="register-user">

    <input
      type="password"
      placeholder="Senha"
      id="register-pass">

    <button id="register-btn">
      CRIAR
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

  <script src="auth.js"></script>

</body>
</html>
