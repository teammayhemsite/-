<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">

  <title>Cadastro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-card">
    <p>teammayhem</p>
    <h1>Criar sua conta</h1>

    <input type="text" maxlength="15" placeholder="＠ Usuário" id="register-user">

    <div class="url-preview">

      <span class="domain">
        teammayhem.vercel.app/
      </span>

      <span id="preview-user">
         ＠ Usuário
      </span>

    </div>

    <input type="password" placeholder="🔒 Senha" id="register-pass">

    <button id="register-btn">
      ⎙ CRIAR
    </button>

    <p>
      Já tenho uma conta!
      <a href="login.html">
        Entrar.
      </a>
    </p>
    <br>
    <hr>
    <div >
      <p style="color: rgb(255, 0, 0);">Não use informações verdadeiras como email/senha!</p>
      <p style="color: rgb(255, 0, 0);">Ex: krpris@gmail.com | krpris10@</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

  <script src="auth.js"></script>
  
  <script>
    const userInput =
      document.getElementById("register-user");

    const previewUser =
      document.getElementById("preview-user");

    userInput.addEventListener("input", () => {

      let username =
        userInput.value
          .toLowerCase()
          .replace(/\s+/g, "");

      previewUser.textContent =
        username || "?";

    });
  </script>

</body>

</html>
