    <style>
        body {
            background-color: black;
        }

        .topo {
            height: 100px;
            background: url() center/cover no-repeat;
        }
    </style>

    <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous"></script>

    <title>@|</title>
</head>

<body>

    <script>
        let prefixo = "@";
        let text = "teruntt";
        let i = 0;

        let apagando = false;
        let pausando = false;

        let cursorVisivel = true;
        let piscadas = 0;
        let maxPiscadas = 6;

        function animarTitulo() {
            let cursor = cursorVisivel ? "|" : " ";
            cursorVisivel = !cursorVisivel;

            if (!apagando && !pausando) {
                document.title = prefixo + text.substring(0, i) + cursor;
                i++;

                if (i > text.length) {
                    i = text.length;
                    pausando = true;
                    piscadas = 0;
                    return setTimeout(animarTitulo, 300);
                }

            } else if (pausando) {
                document.title = prefixo + text + cursor;
                piscadas++;

                if (piscadas >= maxPiscadas) {
                    pausando = false;
                    apagando = true;
                    i = text.length;
                }

            } else {
                i--;
                document.title = prefixo + text.substring(0, i) + cursor;

                if (i <= 0) {
                    pausando = true;
                    piscadas = 0;
                    apagando = false;
                    i = 0;
                }
            }

            setTimeout(animarTitulo, 600);
        }

        animarTitulo();
    </script>

    <div class="card">

        <div class="topo"></div>

        <img src="https://media.discordapp.net/attachments/1493722049569358036/1494392764849197066/1e727d7db6dd9f29e78e9c01446fe2c0.gif?ex=69e27137&is=69e11fb7&hm=1d9571931fc72e42f4d072b84ea283be84a6179f0600cd6c5b86de2c056a9a1a&="
