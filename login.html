<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">

  <title>Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-card">
    <p>teammayhem</p>
    <h1>Entrar</h1>
    
    <input type="text" id="login-user" maxlength="15" placeholder="👤 Usuário">

    <div class="url-preview">

      <span class="domain">
        teammayhem.vercel.app/
      </span>

      <span id="preview-user">
        👤 Usuário
      </span>

    </div>

    <input type="password" placeholder="🔒 Senha" id="login-pass">

    <button id="login-btn">
      ENTRAR
    </button>

    <p>
      Não tenho uma conta:
      <a href="cadastro.html">
        Criar.
      </a>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

  <script src="auth.js"></script>

  <script>
    const userInput =
      document.getElementById("login-user");

    const previewUser =
      document.getElementById("preview-user");

    userInput.addEventListener("input", () => {

      let username =
        userInput.value
          .toLowerCase()
          .replace(/\s+/g, "");

      previewUser.textContent =
        username || "?";

    });
  </script>
</body>

</html>
