<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-card">

    <h1>LOGIN</h1>

    <input
      type="text"
      placeholder="Usuário"
      id="login-user">

    <input
      type="password"
      placeholder="Senha"
      id="login-pass">

    <button id="login-btn">
      SIGN IN
    </button>

    <p>
      Novo aqui?
      <a href="cadastro.html">
        Criar conta
      </a>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

  <script src="auth.js"></script>

</body>
</html>
