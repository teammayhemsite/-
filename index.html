<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Em desenvolvimento</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      color: #f1f5f9;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 15px;
      font-weight: 600;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #ffffff;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      display: block;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-login {
      background: transparent;
      border: 2px solid #303030;
      color: #353535;
    }

    .btn-login:hover {
      background: #4d4d4d;
      color: #3a3a3a;
    }

    .btn-cadastro {
      background: #5a0000;
      color: #252525;
      border: 2px solid #000000;
    }

    .btn-cadastro:hover {
      opacity: 0.85;
    }

    /* melhora no celular */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.3rem;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Olá.</h1>

    <p>
      Esse é um site que ainda está em desenvolvimento, e seria ótimo se você nos apoiasse criando sua primeira conta com perfil totalmente personalizado.
    </p>

    <div class="buttons">
      <a href="login.html" class="btn-login">Fazer Login</a>
      <a href="cadastro.html" class="btn-cadastro">Criar Conta</a>
    </div>
  </div>
</body>
</html>
