<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <link rel="icon" href="https://cdn.discordapp.com/emojis/1380340818224877710.webp?size=96">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Perfil</title>

  <link rel="stylesheet" href="u.css">

  <script src="https://kit.fontawesome.com/eb9af641fe.js" crossorigin="anonymous">
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>

</head>

<body>
  <div id="entrance-screen">

    <div class="entrance-content">

      <img id="entrance-avatar" class="entrance-avatar" src="" alt="">

      <h1 id="entrance-title"></h1>

      <p id="entrance-subtitle">
        𝘁𝗼𝗾𝘂𝗲 𝗽𝗮𝗿𝗮 𝗲𝗻𝘁𝗿𝗮𝗿!
      </p>

    </div>

  </div>

  <div class="cardking">

    <div class="like-box">

      <i class="fa-solid fa-heart" id="like-btn">
      </i>

      <span id="like-count">
        0
      </span>

    </div>

    <!-- BANNER -->
    <div class="topo" id="banner">
    </div>

    <!-- FOTO + BALÃO -->
    <div class="top-info">

      <div class="avatar-wrapper">

        <img src="" class="perfilking" id="avatar">

        <img src="" class="avatar-frame" id="avatar-frame">

      </div>

      <div class="balao" id="balao">
        texto
      </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudoking">

      <h1 id="username">
        usuário
      </h1>

      <p id="bio">
        bio
      </p>

    </div>

    <!-- SOCIAL + EXTRAS -->
    <div class="social-box">

      <!-- REDES -->
      <div class="socials" id="socials">
      </div>

      <!-- EXTRAS -->
      <div id="extras-container"></div>

    </div>

  </div>

  <script src="u.js"></script>

  <!-- PLAYER -->
  <audio id="profile-music"></audio>

  <button class="ac2-trigger playing" aria-label="Toggle player">

    <div class="ac2-bars">

      <div class="ac2-bar"></div>
      <div class="ac2-bar"></div>
      <div class="ac2-bar"></div>
      <div class="ac2-bar"></div>
      <div class="ac2-bar"></div>

    </div>

  </button>

  <div class="ac2-pill">
    <img src="https://kknalifzcckzvypmkbgx.supabase.co/storage/v1/object/public/assets/socials/Mix%20de%20musica.jpg"
      class="ac2-thumb" draggable="false">

    <div class="ac2-info">

      <span class="ac2-song">
        Mix de música
      </span>

      <span class="ac2-artist">
        tocando agora
      </span>

    </div>

    <div class="ac2-sep"></div>

    <button class="ac2-btn play-btn">

      <i class="fas fa-pause"></i>

    </button>

    <div class="ac2-sep"></div>

    <div class="ac2-volume-wrap">
      -
      <input class="ac2-range ac2-volume" min="0" max="100" value="10" type="range">
      +
    </div>

  </div>

  <a href="https://teammayhem.vercel.app/" target="_blank" class="watermark-card">
    <img src="https://kknalifzcckzvypmkbgx.supabase.co/storage/v1/object/public/assets/socials/Crie%20seu%20perfil.jpg"
      alt="">

    <span>CRIE SEU PERFIL</span>
  </a>

  <button id="album-btn" class="album-btn">
    <i class="fa-regular fa-images"></i>
  </button>

  <div id="album-page" class="album-page">

    <button id="close-album" class="close-album">
      ✕
    </button>

    <div class="album-grid">

      <img id="album1">
      <img id="album2">
      <img id="album3">
      <img id="album4">

    </div>

  </div>

  <header>Team Mayhem&trade; &copy; 2026</header>
</body>

</html>
